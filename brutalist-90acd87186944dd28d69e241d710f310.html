<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Report</title>
<style>
:root {
  --bg: #f5f5f5;
  --paper: #ffffff;
  --color: #000000;
  --muted: #555555;
  --rule: #000000;
  --accent: #ffe600;
  --accent-deep: #c8b500;
  --neg: #ff2b2b;
}
html { -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
body { background-color: var(--bg); display: flex; margin: 0; padding: 0; font-size: 0.875rem; line-height: 1.45rem; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: var(--color); -webkit-font-smoothing: antialiased; }
table { font-size: 0.875rem; border-collapse: collapse; }
main { background-color: var(--paper); margin: 1.5rem 2rem; border: 4px solid var(--rule); border-radius: 0; box-shadow: 12px 12px 0 0 var(--rule); color: var(--color); padding: 2rem 2.25rem; min-width: 80ch; position: relative; }
main::before { content: ''; position: absolute; top: -4px; left: -4px; width: 64px; height: 24px; background-color: var(--accent); border-right: 4px solid var(--rule); border-bottom: 4px solid var(--rule); }
h1 { margin: 0; font-weight: 900; font-size: 0.75rem; padding-bottom: 0.5rem; letter-spacing: 0.16em; text-transform: uppercase; }
h2 { margin: 0; font-weight: 900; font-size: 3rem; line-height: 1; padding-bottom: 1rem; letter-spacing: -0.04em; text-transform: uppercase; }
h3 { margin: 0; font-weight: 700; font-size: 1rem; padding-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.04em; }
h4 { margin: 0; font-weight: 700; font-size: 0.875rem; padding-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
ins { color: var(--color); text-decoration: none; font-weight: 900; background-color: var(--accent); padding: 0 0.25rem; }
del { color: #fff; background-color: var(--neg); padding: 0 0.25rem; text-decoration: none; }
thead h1, thead h2, thead h3, thead h4 { text-align: center; }
thead h2 { display: inline-block; background-color: var(--accent); padding: 0.25rem 0.75rem; box-shadow: 6px 6px 0 0 var(--rule); }
thead .reportTitle th { padding-bottom: 0.5rem; padding-top: 0.25rem; }
hr { border: none; background-color: var(--rule); margin: 0; height: 4px; }
main > table { min-width: 80ch; width: 100%; }
dl { display: grid; grid-gap: 0.5rem 1rem; grid-template-columns: max-content; }
dt { font-weight: 900; text-transform: uppercase; letter-spacing: 0.04em; }
dd { grid-column-start: 2; }
table { border: 1px none var(--rule); border-collapse: collapse; }
th { vertical-align: bottom; font-weight: 900; }
thead .columns th { color: var(--color); font-weight: 900; padding: 0.375rem 0.5rem; text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.75rem; }
thead .columnGroups th { background-color: var(--rule); color: var(--accent); font-size: 0.8125rem; padding: 0.25rem 0.5rem; }
tbody th { text-align: start; padding: 0.5rem 0.625rem; background-color: var(--rule); color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.875rem; }
th, td { border: 1px none var(--rule); padding: 0.375rem 0.5rem; }
tbody tr.totalRow td { background-color: var(--accent); font-weight: 900; }
a { color: var(--color); text-decoration: none; background-color: var(--accent); padding: 0 0.1875rem; font-weight: 700; }
a:hover { background-color: var(--color); color: var(--accent); }
.border { border: 4px solid var(--rule); }
#spinner { position: fixed; top: 50%; left: 50%; width: 48px; height: 48px; margin: -24px 0 0 -24px; border: 6px solid var(--rule); border-top-color: var(--accent); border-radius: 0; opacity: 0; animation: fadein 200ms linear 200ms forwards, spin 800ms linear infinite; }
@keyframes fadein { to { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }

@media (prefers-color-scheme: dark) {
  :root { --bg: #292524; --paper: #0a0a0a; --color: #ffffff; --muted: #aaaaaa; --rule: #ffffff; --accent: #ffe600; --accent-deep: #ffe600; }
  main { box-shadow: 12px 12px 0 0 var(--rule); }
  tbody th { color: var(--color); background-color: var(--rule); color: #000; }
  thead .columnGroups th { background-color: var(--rule); color: #000; }
}

@page { margin: 0; }
@media print {
  html, body, main, table, thead, tbody, tfoot, tr, th, td { -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
  html, body { margin: 0; padding: 0; background-color: var(--paper); }
  body { display: block; }
  main { margin: 0; padding: 14mm 16mm; width: 100%; min-width: 0; box-sizing: border-box; border: none; border-radius: 0; box-shadow: none; }
  main::before { display: none; }
  #spinner { display: none; }
  main > table { min-width: initial; width: 100%; }
  hr { background-color: #000; }
  tbody th { background-color: #000; color: #fff; }
  th, td { border: 1px none #000; }
  tbody tr.totalRow td { background-color: #ffe600; }
  a { color: #000; background-color: #ffe600; pointer-events: none; cursor: default; }
  .border { border: 4px solid #000; }
}
</style>
</head>
<body>
<div id="spinner"></div>
<main id="root" style="display: none"></main>
<script>
document.currentScript.remove();
(async function () {
  const root = document.getElementById('root');
  try {
    const response = await fetch('/api4/report-view-v1' + window.location.search, {
      headers: { 'Accept': 'application/json' },
      credentials: 'same-origin',
    });
    if (!response.ok) {
      const body = await response.text();
      root.textContent = 'Error ' + response.status + ': ' + body;
      return;
    }
    const model = await response.json();
    if (!model) {
      root.textContent = 'No data.';
      return;
    }
    if (model.title) document.title = model.title;
    if (model.direction) document.documentElement.dir = model.direction;
    render(root, model);
  } catch (err) {
    root.textContent = 'Failed to load: ' + err;
  } finally {
    const spinner = document.getElementById('spinner');
    if (spinner) spinner.remove();
    root.style.display = '';
  }
})();

function render(root, m) {
  root.textContent = '';
  const { leaves, groups, hasSubcolumns } = flattenColumns(m.columns || []);
  const totalCols = leaves.length + 1;

  const table = document.createElement('table');
  table.id = 'report';

  const thead = document.createElement('thead');
  thead.appendChild(headBlockRow('businessName', totalCols, 'h1', m.business));
  thead.appendChild(headBlockRow('reportTitle', totalCols, 'h2', m.title, 'reportTitle'));
  if (m.subtitle) thead.appendChild(headBlockRow(null, totalCols, 'h3', m.subtitle, 'reportSubtitle'));
  if (m.subtitle2) thead.appendChild(headBlockRow(null, totalCols, 'h4', m.subtitle2, 'reportSubtitle'));

  let rightAligned = true;
  if (hasSubcolumns) {
    rightAligned = false;
    const tr = document.createElement('tr');
    tr.className = 'columnGroups';
    tr.appendChild(document.createElement('th'));
    for (const g of groups) {
      if (g.name) {
        const th = document.createElement('th');
        th.setAttribute('colspan', g.span);
        th.setAttribute('style', 'font-weight: 900; width: 10ch; text-align: center; text-transform: uppercase; letter-spacing: 0.08em');
        th.textContent = g.name;
        tr.appendChild(th);
      } else {
        for (let i = 0; i < g.span; i++) tr.appendChild(document.createElement('th'));
      }
    }
    thead.appendChild(tr);
  }

  const colTr = document.createElement('tr');
  colTr.className = 'columns';
  const firstTh = document.createElement('th');
  firstTh.setAttribute('style', 'border-bottom: 4px solid var(--rule)');
  colTr.appendChild(firstTh);
  for (const c of leaves) {
    const th = document.createElement('th');
    th.setAttribute('style', 'border-bottom: 4px solid var(--rule); font-weight: 900; width: 10ch; vertical-align: bottom; text-align: ' + (rightAligned ? 'right' : 'center'));
    th.textContent = c.name || '';
    colTr.appendChild(th);
  }
  thead.appendChild(colTr);

  const blank = document.createElement('tr');
  const blankTh = document.createElement('th');
  blankTh.setAttribute('colspan', totalCols);
  blankTh.innerHTML = '&nbsp;';
  blank.appendChild(blankTh);
  thead.appendChild(blank);

  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  if (m.rows) renderRowsObject(m.rows, 0, leaves, tbody);
  table.appendChild(tbody);

  if (m.footer) {
    const tfoot = document.createElement('tfoot');
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.setAttribute('colspan', totalCols);
    td.setAttribute('style', 'text-align: center; padding-top: 24px; white-space: pre-line; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.75rem');
    td.innerHTML = m.footer;
    tr.appendChild(td);
    tfoot.appendChild(tr);
    table.appendChild(tfoot);
  }

  root.appendChild(table);
}

function flattenColumns(columns) {
  const leaves = [];
  const groups = [];
  let hasSubcolumns = false;
  for (const c of columns) {
    if (c.subcolumns && c.subcolumns.length) {
      hasSubcolumns = true;
      groups.push({ name: c.name, span: c.subcolumns.length });
      for (const sc of c.subcolumns) leaves.push(sc);
    } else {
      groups.push({ name: null, span: 1 });
      leaves.push(c);
    }
  }
  return { leaves, groups, hasSubcolumns };
}

function headBlockRow(id, colspan, tagName, text, className) {
  const tr = document.createElement('tr');
  if (id) tr.id = id;
  if (className) tr.className = className;
  const th = document.createElement('th');
  th.setAttribute('colspan', colspan);
  const inner = document.createElement(tagName);
  inner.textContent = text || '';
  th.appendChild(inner);
  tr.appendChild(th);
  return tr;
}

function spacerRow(colspan) {
  const tr = document.createElement('tr');
  const td = document.createElement('td');
  td.setAttribute('colspan', colspan);
  td.innerHTML = '&nbsp;';
  tr.appendChild(td);
  return tr;
}

function renderRowsObject(rowsObj, level, leaves, tbody) {
  if (!rowsObj) return;
  const items = rowsObj.items || [];

  for (const row of items) {
    if (row.isTotalRow) {
      const totalCells = row.cells || rowsObj.totalCells;
      tbody.appendChild(spacerRow(leaves.length + 1));
      tbody.appendChild(totalRow(row.displayName, totalCells, leaves, true, true, 0));
      tbody.appendChild(spacerRow(leaves.length + 1));
      continue;
    }
    if (row.rows) {
      renderGroupRow(row, level, leaves, tbody);
    } else if (row.cells) {
      renderSimpleRow(row, level, leaves, tbody);
    }
  }

  if (rowsObj.renderTotalRow) {
    if (rowsObj.makeTotalStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
    tbody.appendChild(totalRow(rowsObj.totalText, rowsObj.totalCells, leaves, rowsObj.makeTotalStandOut, rowsObj.makeTotalStandOut, level));
    if (rowsObj.makeTotalStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
  }
}

function renderGroupRow(row, level, leaves, tbody) {
  const rowsObj = row.rows;

  if (row.displayName) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.setAttribute('colspan', leaves.length + 1);
    td.setAttribute('style', 'padding-inline-start: ' + ((level * 20) + 5) + 'px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; padding-top: 0.5rem');
    td.textContent = row.displayName;
    tr.appendChild(td);
    tbody.appendChild(tr);
  }

  const innerLevel = row.displayName ? level + 1 : level;
  renderRowsObject(rowsObj, innerLevel, leaves, tbody);

  if (row.groupTotalText) {
    if (rowsObj.makeTotalStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
    tbody.appendChild(totalRow(row.groupTotalText, rowsObj.totalCells, leaves, rowsObj.makeTotalStandOut, rowsObj.makeTotalStandOut, innerLevel));
    if (rowsObj.makeTotalStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
  }
}

function renderSimpleRow(row, level, leaves, tbody) {
  if (row.makeStandOut) tbody.appendChild(spacerRow(leaves.length + 1));

  const tr = document.createElement('tr');
  let nameStyle = 'padding-inline-start: ' + ((level * 20) + 5) + 'px';
  if (row.makeStandOut) nameStyle += '; font-weight: 900; border-top: 4px solid var(--rule); border-bottom: 4px solid var(--rule); text-transform: uppercase; letter-spacing: 0.06em';
  const nameTd = document.createElement('td');
  nameTd.setAttribute('style', nameStyle);
  nameTd.textContent = row.displayName || '';
  tr.appendChild(nameTd);

  for (let i = 0; i < leaves.length; i++) {
    const col = leaves[i];
    const cell = row.cells && row.cells[i];
    const td = document.createElement('td');
    let style = 'text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap';
    if (col.isBold) style += '; font-weight: 900';
    if (row.makeStandOut) style += '; font-weight: 900; border-top: 4px solid var(--rule); border-bottom: 4px solid var(--rule)';
    td.setAttribute('style', style);

    if (cell && cell.text != null) {
      if (cell.value != null) td.setAttribute('data-tsv', String(cell.value));
      appendCellContent(td, cell.text, cell.link && cell.link.href);
    }
    tr.appendChild(td);
  }
  tbody.appendChild(tr);

  if (row.makeStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
}

function totalRow(name, cells, leaves, borderTop, borderBottom, level) {
  const tr = document.createElement('tr');
  tr.className = 'totalRow';

  let nameStyle = 'padding-inline-start: ' + ((level * 20) + 5) + 'px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em';
  if (borderTop) nameStyle += '; border-top: 4px solid var(--rule)';
  if (borderBottom) nameStyle += '; border-bottom: 4px solid var(--rule)';
  const nameTd = document.createElement('td');
  nameTd.setAttribute('style', nameStyle);
  nameTd.textContent = name || '';
  tr.appendChild(nameTd);

  for (let i = 0; i < leaves.length; i++) {
    const td = document.createElement('td');
    const cell = cells && cells[i];
    let style;
    if (cell) {
      style = 'text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; font-weight: 900; border-top: 4px solid var(--rule); border-bottom: 4px solid var(--rule)';
    } else {
      style = '';
      if (borderTop) style += 'border-top: 4px solid var(--rule)';
      if (borderBottom) style += (style ? '; ' : '') + 'border-bottom: 4px solid var(--rule)';
    }
    if (style) td.setAttribute('style', style);

    if (cell && cell.text != null) {
      if (cell.value != null) td.setAttribute('data-tsv', String(cell.value));
      td.textContent = cell.text;
    }
    tr.appendChild(td);
  }
  return tr;
}

function appendCellContent(td, text, href) {
  if (text == null) return;
  if (href) {
    const a = document.createElement('a');
    a.href = href;
    a.target = '_top';
    a.textContent = text;
    td.appendChild(a);
  } else {
    td.textContent = text;
  }
}

</script>
</body>
</html>
