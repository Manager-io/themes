<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Report</title>
<style>
:root {
  --bg: #f5f5f5;
  --paper: #fcf6e6;
  --paper-tint: #f5ecd2;
  --color: #2c1418;
  --muted: #7a4a3a;
  --rule: #a87633;
  --rule-soft: #d4b88a;
  --accent: #7a2a1a;
  --accent-deep: #4a160c;
  --gold: #a07028;
  --gold-light: #c89a4a;
  --pos: #2a5a2a;
  --neg: #8a1818;
}
html { -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
body {
  background-color: var(--bg);
  display: flex; margin: 0; padding: 0;
  font-size: 0.9375rem; line-height: 1.55rem;
  font-family: 'Hoefler Text', 'Baskerville', 'Garamond', 'Apple Garamond', 'Cambria', Georgia, 'Times New Roman', serif;
  color: var(--color);
  font-feature-settings: 'liga' 1, 'dlig' 1, 'onum' 1;
}
table { font-size: 0.9375rem; border-collapse: collapse; }
main {
  background-color: var(--paper);
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(160,112,40,0.06), transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(160,112,40,0.06), transparent 50%);
  margin: 1.5rem 2rem;
  padding: 3.5rem 3.5rem 3rem;
  border: 1px solid var(--rule);
  box-shadow:
    inset 0 0 0 6px var(--paper),
    inset 0 0 0 7px var(--gold),
    inset 0 0 0 11px var(--paper),
    inset 0 0 0 12px var(--rule-soft),
    0 6px 22px rgba(60,30,20,0.22);
  color: var(--color);
  min-width: 80ch;
  position: relative;
}
main::before, main::after {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.5rem;
  line-height: 1;
  color: var(--gold);
  pointer-events: none;
}
main::before { content: '\2766'; top: 1rem; }
main::after { content: '\2767'; bottom: 1rem; }
h1 {
  margin: 0;
  font-weight: 600;
  font-size: 0.8125rem;
  padding-bottom: 0.625rem;
  text-transform: uppercase;
  letter-spacing: 0.5em;
  text-indent: 0.5em;
  color: var(--gold);
}
h2 {
  margin: 0;
  font-weight: 700;
  font-size: 2.5rem;
  padding-bottom: 0.875rem;
  font-style: italic;
  font-family: 'Big Caslon', 'Hoefler Text', 'Didot', 'Bodoni 72', 'Cambria', Georgia, serif;
  letter-spacing: 0.005em;
  line-height: 1.15;
  color: var(--accent-deep);
}
thead h2::after {
  content: '\2014\00a0\00a0\2766\00a0\00a0\2014';
  display: block;
  font-size: 1rem;
  color: var(--gold);
  margin-top: 0.875rem;
  letter-spacing: 0.25em;
  font-weight: normal;
  font-style: normal;
  font-family: 'Hoefler Text', Georgia, serif;
}
h3 { margin: 0; font-weight: 400; font-style: italic; font-size: 1.0625rem; padding-bottom: 0.375rem; color: var(--muted); }
h4 { margin: 0; font-weight: 400; font-style: italic; font-size: 0.9375rem; padding-bottom: 0.625rem; color: var(--muted); }
ins { color: var(--pos); text-decoration: none; font-style: italic; }
del { color: var(--neg); }
thead h1, thead h2, thead h3, thead h4 { text-align: center; }
hr { border: none; background-color: var(--gold); margin: 0; height: 1px; }
main > table { min-width: 80ch; width: 100%; }
dl { display: grid; grid-gap: 0.375rem 1rem; grid-template-columns: max-content; }
dt { font-weight: 600; font-variant: small-caps; letter-spacing: 0.04em; color: var(--accent); }
dd { grid-column-start: 2; }
table { border: 1px none var(--rule-soft); border-collapse: collapse; }
th { vertical-align: bottom; }
thead .columns th { font-variant: small-caps; letter-spacing: 0.12em; font-weight: 600; padding-bottom: 0.5rem; color: var(--accent-deep); }
thead .columnGroups th { font-variant: small-caps; letter-spacing: 0.1em; font-weight: 700; color: var(--accent); }
tbody th {
  text-align: start;
  padding: 0.5625rem 0.875rem;
  background: linear-gradient(180deg, var(--accent), var(--accent-deep));
  color: var(--paper);
  font-weight: 600;
  letter-spacing: 0.1em;
  font-variant: small-caps;
  border-top: 1px solid var(--gold);
  border-bottom: 1px solid var(--gold);
  text-shadow: 0 1px 0 rgba(0,0,0,0.25);
}
th, td { border: 1px none var(--rule-soft); padding: 0.3125rem 0.5rem; }
tbody tr.totalRow td { background-color: rgba(160,112,40,0.10); font-style: italic; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-deep); text-decoration: underline; }
.border { border: 1px solid var(--rule); }
tfoot td { font-style: italic; color: var(--muted); }
#spinner { position: fixed; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px 0 0 -20px; border: 3px solid rgba(160,112,40,0.18); border-top-color: var(--gold); border-radius: 50%; opacity: 0; animation: fadein 200ms linear 200ms forwards, spin 800ms linear infinite; }
@keyframes fadein { to { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }

@media (prefers-color-scheme: dark) {
  :root { --bg: #292524; --paper: #1c130c; --paper-tint: #2a1d12; --color: #efd9a8; --muted: #b8956a; --rule: #c89a4a; --rule-soft: #6b5028; --accent: #d4632a; --accent-deep: #e58a40; --gold: #d4a060; --gold-light: #e8c080; }
  tbody th { color: #1c130c; }
  tbody tr.totalRow td { background-color: rgba(212,160,96,0.12); }
}

@page { margin: 0; }
@media print {
  html, body, main, table, thead, tbody, tfoot, tr, th, td { -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
  html, body { margin: 0; padding: 0; background-color: var(--paper); }
  body { display: block; }
  main {
    margin: 0; padding: 14mm 16mm; width: 100%; min-width: 0; box-sizing: border-box;
    border: none; border-radius: 0;
    box-shadow:
      inset 0 0 0 6px var(--paper),
      inset 0 0 0 7px var(--gold),
      inset 0 0 0 11px var(--paper),
      inset 0 0 0 12px var(--rule-soft);
  }
  #spinner { display: none; }
  main > table { min-width: initial; width: 100%; }
  a { pointer-events: none; cursor: default; }
}
</style>
</head>
<body>
<div id="spinner"></div>
<main id="root" style="display: none"></main>
<script>
document.currentScript.remove();
(async function () {
  const root = document.getElementById('root');
  try {
    const response = await fetch('/api4/report-view-v1' + window.location.search, {
      headers: { 'Accept': 'application/json' },
      credentials: 'same-origin',
    });
    if (!response.ok) {
      const body = await response.text();
      root.textContent = 'Error ' + response.status + ': ' + body;
      return;
    }
    const model = await response.json();
    if (!model) {
      root.textContent = 'No data.';
      return;
    }
    if (model.title) document.title = model.title;
    if (model.direction) document.documentElement.dir = model.direction;
    render(root, model);
  } catch (err) {
    root.textContent = 'Failed to load: ' + err;
  } finally {
    const spinner = document.getElementById('spinner');
    if (spinner) spinner.remove();
    root.style.display = '';
  }
})();

function render(root, m) {
  root.textContent = '';
  const { leaves, groups, hasSubcolumns } = flattenColumns(m.columns || []);
  const totalCols = leaves.length + 1;

  const table = document.createElement('table');
  table.id = 'report';

  const thead = document.createElement('thead');
  thead.appendChild(headBlockRow('businessName', totalCols, 'h1', m.business));
  thead.appendChild(headBlockRow('reportTitle', totalCols, 'h2', m.title));
  if (m.subtitle) thead.appendChild(headBlockRow(null, totalCols, 'h3', m.subtitle, 'reportSubtitle'));
  if (m.subtitle2) thead.appendChild(headBlockRow(null, totalCols, 'h4', m.subtitle2, 'reportSubtitle'));

  let rightAligned = true;
  if (hasSubcolumns) {
    rightAligned = false;
    const tr = document.createElement('tr');
    tr.className = 'columnGroups';
    tr.appendChild(document.createElement('th'));
    for (const g of groups) {
      if (g.name) {
        const th = document.createElement('th');
        th.setAttribute('colspan', g.span);
        th.setAttribute('style', 'font-weight: bold; width: 10ch; text-align: center; border-bottom-style: solid');
        th.textContent = g.name;
        tr.appendChild(th);
      } else {
        for (let i = 0; i < g.span; i++) tr.appendChild(document.createElement('th'));
      }
    }
    thead.appendChild(tr);
  }

  const colTr = document.createElement('tr');
  colTr.className = 'columns';
  const firstTh = document.createElement('th');
  firstTh.setAttribute('style', 'border-bottom-style: solid');
  colTr.appendChild(firstTh);
  for (const c of leaves) {
    const th = document.createElement('th');
    th.setAttribute('style', 'border-bottom-style: solid; font-weight: bold; width: 10ch; vertical-align: bottom; text-align: ' + (rightAligned ? 'right' : 'center'));
    th.textContent = c.name || '';
    colTr.appendChild(th);
  }
  thead.appendChild(colTr);

  const blank = document.createElement('tr');
  const blankTh = document.createElement('th');
  blankTh.setAttribute('colspan', totalCols);
  blankTh.innerHTML = '&nbsp;';
  blank.appendChild(blankTh);
  thead.appendChild(blank);

  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  if (m.rows) renderRowsObject(m.rows, 0, leaves, tbody);
  table.appendChild(tbody);

  if (m.footer) {
    const tfoot = document.createElement('tfoot');
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.setAttribute('colspan', totalCols);
    td.setAttribute('style', 'text-align: center; padding-top: 20px; white-space: pre-line');
    td.innerHTML = m.footer;
    tr.appendChild(td);
    tfoot.appendChild(tr);
    table.appendChild(tfoot);
  }

  root.appendChild(table);
}

function flattenColumns(columns) {
  const leaves = [];
  const groups = [];
  let hasSubcolumns = false;
  for (const c of columns) {
    if (c.subcolumns && c.subcolumns.length) {
      hasSubcolumns = true;
      groups.push({ name: c.name, span: c.subcolumns.length });
      for (const sc of c.subcolumns) leaves.push(sc);
    } else {
      groups.push({ name: null, span: 1 });
      leaves.push(c);
    }
  }
  return { leaves, groups, hasSubcolumns };
}

function headBlockRow(id, colspan, tagName, text, className) {
  const tr = document.createElement('tr');
  if (id) tr.id = id;
  if (className) tr.className = className;
  const th = document.createElement('th');
  th.setAttribute('colspan', colspan);
  const inner = document.createElement(tagName);
  inner.textContent = text || '';
  th.appendChild(inner);
  tr.appendChild(th);
  return tr;
}

function spacerRow(colspan) {
  const tr = document.createElement('tr');
  const td = document.createElement('td');
  td.setAttribute('colspan', colspan);
  td.innerHTML = '&nbsp;';
  tr.appendChild(td);
  return tr;
}

function renderRowsObject(rowsObj, level, leaves, tbody) {
  if (!rowsObj) return;
  const items = rowsObj.items || [];

  for (const row of items) {
    if (row.isTotalRow) {
      const totalCells = row.cells || rowsObj.totalCells;
      tbody.appendChild(spacerRow(leaves.length + 1));
      tbody.appendChild(totalRow(row.displayName, totalCells, leaves, true, true, 0));
      tbody.appendChild(spacerRow(leaves.length + 1));
      continue;
    }
    if (row.rows) {
      renderGroupRow(row, level, leaves, tbody);
    } else if (row.cells) {
      renderSimpleRow(row, level, leaves, tbody);
    }
  }

  if (rowsObj.renderTotalRow) {
    if (rowsObj.makeTotalStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
    tbody.appendChild(totalRow(rowsObj.totalText, rowsObj.totalCells, leaves, rowsObj.makeTotalStandOut, rowsObj.makeTotalStandOut, level));
    if (rowsObj.makeTotalStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
  }
}

function renderGroupRow(row, level, leaves, tbody) {
  const rowsObj = row.rows;

  if (row.displayName) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.setAttribute('colspan', leaves.length + 1);
    td.setAttribute('style', 'padding-inline-start: ' + ((level * 20) + 5) + 'px; font-weight: bold');
    td.textContent = row.displayName;
    tr.appendChild(td);
    tbody.appendChild(tr);
  }

  const innerLevel = row.displayName ? level + 1 : level;
  renderRowsObject(rowsObj, innerLevel, leaves, tbody);

  if (row.groupTotalText) {
    if (rowsObj.makeTotalStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
    tbody.appendChild(totalRow(row.groupTotalText, rowsObj.totalCells, leaves, rowsObj.makeTotalStandOut, rowsObj.makeTotalStandOut, innerLevel));
    if (rowsObj.makeTotalStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
  }
}

function renderSimpleRow(row, level, leaves, tbody) {
  if (row.makeStandOut) tbody.appendChild(spacerRow(leaves.length + 1));

  const tr = document.createElement('tr');
  let nameStyle = 'padding-inline-start: ' + ((level * 20) + 5) + 'px';
  if (row.makeStandOut) nameStyle += '; font-weight: bold; border-top-style: solid; border-bottom-style: solid';
  const nameTd = document.createElement('td');
  nameTd.setAttribute('style', nameStyle);
  nameTd.textContent = row.displayName || '';
  tr.appendChild(nameTd);

  for (let i = 0; i < leaves.length; i++) {
    const col = leaves[i];
    const cell = row.cells && row.cells[i];
    const td = document.createElement('td');
    let style = 'text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap';
    if (col.isBold) style += '; font-weight: bold';
    if (row.makeStandOut) style += '; font-weight: bold; border-top-style: solid; border-bottom-style: solid';
    td.setAttribute('style', style);

    if (cell && cell.text != null) {
      if (cell.value != null) td.setAttribute('data-tsv', String(cell.value));
      appendCellContent(td, cell.text, cell.link && cell.link.href);
    }
    tr.appendChild(td);
  }
  tbody.appendChild(tr);

  if (row.makeStandOut) tbody.appendChild(spacerRow(leaves.length + 1));
}

function totalRow(name, cells, leaves, borderTop, borderBottom, level) {
  const tr = document.createElement('tr');
  tr.className = 'totalRow';

  let nameStyle = 'padding-inline-start: ' + ((level * 20) + 5) + 'px; font-weight: bold';
  if (borderTop) nameStyle += '; border-top-style: solid';
  if (borderBottom) nameStyle += '; border-bottom-style: solid';
  const nameTd = document.createElement('td');
  nameTd.setAttribute('style', nameStyle);
  nameTd.textContent = name || '';
  tr.appendChild(nameTd);

  for (let i = 0; i < leaves.length; i++) {
    const td = document.createElement('td');
    const cell = cells && cells[i];
    let style;
    if (cell) {
      style = 'text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; font-weight: bold; border-top-style: solid; border-bottom-style: solid';
    } else {
      style = '';
      if (borderTop) style += 'border-top-style: solid';
      if (borderBottom) style += (style ? '; ' : '') + 'border-bottom-style: solid';
    }
    if (style) td.setAttribute('style', style);

    if (cell && cell.text != null) {
      if (cell.value != null) td.setAttribute('data-tsv', String(cell.value));
      td.textContent = cell.text;
    }
    tr.appendChild(td);
  }
  return tr;
}

function appendCellContent(td, text, href) {
  if (text == null) return;
  if (href) {
    const a = document.createElement('a');
    a.href = href;
    a.target = '_top';
    a.textContent = text;
    td.appendChild(a);
  } else {
    td.textContent = text;
  }
}

</script>
</body>
</html>
